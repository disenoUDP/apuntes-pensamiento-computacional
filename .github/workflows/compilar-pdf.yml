name: compilar y subir PDF

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          latexmk \
          texlive-xetex \
          texlive-latex-extra \
          texlive-fonts-recommended \
          texlive-fonts-extra \
          texlive-lang-spanish \
          texlive-science \
          texlive-extra-utils \
          texlive-bibtex-extra \
          texlive-pictures \
          biber \
          fonts-noto \
          fonts-noto-core \
          fonts-noto-extra

      - name: generate nostarch.cls
        run: |
          if [ -f nostarch.ins ]; then
            xelatex nostarch.ins
          fi

      # - name: compile PDF
      #   run: |
      #     latexmk \
      #       -xelatex \
      #       -bibtex \
      #       -interaction=nonstopmode \
      #       -file-line-error \
      #       principal.tex

      - name: compile PDF
        run: |
          xelatex -interaction=nonstopmode principal.tex

          bibtex principal || true

          makeindex -s nostarch.ist -o principal.ind principal.idx || true

          xelatex -interaction=nonstopmode principal.tex
          xelatex -interaction=nonstopmode principal.tex

      - name: rerun until references stabilize
        run: |
          while grep -q "Label(s) may have changed" principal.log
          do
            echo "Rerunning XeLaTeX..."
            xelatex -interaction=nonstopmode principal.tex
          done || true

      - name: show logs on failure
        if: failure()
        run: |
          echo "===== LOG FILES ====="
          find . -name "*.log"

          echo "===== principal.log ====="
          cat principal.log || true

      - name: preparar sitio
        run: |
          mkdir site
          cp principal.pdf site/principal.pdf

          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>disenoUDP - pensamiento computacional</title>
            <style>
              body { font-family: sans-serif; margin: 0; }
              .content { padding: 1rem; background: #111; color: white; }
              iframe { width: 100%; height: 90vh; border: none; }
            </style>
          </head>
          <body>
            <div class="content">PDF publicado automáticamente</div>
            <iframe id="viewer" src="principal.pdf"></iframe>
          </body>
          </html>
          EOF

      - name: upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: check GitHub Pages status
        id: pages-status
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              core.setOutput('enabled', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.warning('GitHub Pages is not enabled for this repository; skipping deployment.');
                core.setOutput('enabled', 'false');
                return;
              }
              throw error;
            }

      - name: deploy to GitHub Pages
        id: deployment
        if: steps.pages-status.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4

      - name: skip deploy when Pages is disabled
        if: steps.pages-status.outputs.enabled != 'true'
        run: echo "GitHub Pages is disabled. Enable it in Settings > Pages to publish."
